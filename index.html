<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hkaya | Cinema</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@400;700;800&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        * { -webkit-user-select: none; user-select: none; outline: none; }
        :root { --amber: #FFBF00; --bg: #050505; --card: #121212; }
        body { margin: 0; padding: 0; background-color: var(--bg); color: white; font-family: 'Cairo', sans-serif; overflow-x: hidden; }

        /* --- الستارة --- */
        #page-loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: var(--amber); z-index: 9999; transform: translateX(-100%); transition: transform 0.6s cubic-bezier(0.77, 0, 0.175, 1); pointer-events: none; }
        #page-loader.active { transform: translateX(0); }
        #page-loader.exit { transform: translateX(100%); }

        /* --- كارت تنبيه TDM Manager --- */
        #mxAlertCard { position: fixed; bottom: -100%; left: 0; width: 100%; background: #121212; z-index: 6000; padding: 30px 20px; border-radius: 25px 25px 0 0; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); border-top: 2px solid var(--amber); text-align: center; }
        #mxAlertCard.active { bottom: 0; }
        .mx-icon { width: 70px; height: 70px; background: #222; border-radius: 18px; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; border: 1px solid #333; }
        .mx-icon i { font-size: 35px; color: var(--amber); }
        .mx-btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .mx-btn { flex: 1; padding: 15px; border-radius: 12px; font-weight: 700; border: none; cursor: pointer; }
        .btn-confirm { background: var(--amber); color: black; }
        .btn-cancel { background: #222; color: white; }

        /* --- السلايدر --- */
        .slider-container { position: relative; width: 100%; height: 450px; background: #000; }
        .main-slide { width: 100%; height: 100%; background-size: cover; background-position: center; position: relative; display: flex; align-items: flex-end; }
        .overlay { position: absolute; inset: 0; background: linear-gradient(to top, var(--bg) 10%, transparent 80%); }
        .movie-info-home { position: relative; z-index: 5; padding: 20px; width: 100%; }
        .watch-now-btn { background: var(--amber); color: black; border: none; padding: 14px; border-radius: 12px; font-weight: 700; width: 100%; font-size: 17px; cursor: pointer; }

        /* --- الأقسام --- */
        .section-header { padding: 20px 15px 10px; display: flex; align-items: center; gap: 10px; }
        .amber-bar { width: 4px; height: 20px; background: var(--amber); }
        .horizontal-layout { display: flex; overflow-x: auto; gap: 12px; padding: 10px 15px; }
        .horizontal-layout::-webkit-scrollbar { display: none; }
        .movie-card { min-width: 120px; border-radius: 10px; overflow: hidden; border: 1px solid #222; }
        .movie-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }

        /* --- التفاصيل --- */
        #detailsPage { display: none; position: fixed; inset: 0; z-index: 1000; background: var(--bg); overflow-y: auto; }
        .back-nav { position: absolute; top: 20px; right: 20px; z-index: 1100; width: 40px; height: 40px; background: rgba(0,0,0,0.5); border: 1px solid var(--amber); color: var(--amber); border-radius: 50%; display: flex; justify-content: center; align-items: center; }
        .details-hero { width: 100%; height: 300px; background-size: cover; background-position: center; }
        .details-body { padding: 20px; }
        .ep-card { display: flex; flex-direction: row-reverse; background: var(--card); border-radius: 12px; margin-bottom: 12px; padding: 10px; gap: 10px; align-items: center; border: 1px solid #1f1f1f; }
        .ep-thumb { width: 90px; aspect-ratio: 16/9; border-radius: 6px; overflow: hidden; }
        .ep-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .ep-meta { flex: 1; text-align: right; }
        .sheet-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; z-index: 5999; }
    </style>
</head>
<body>

<div id="page-loader"></div>
<div class="sheet-overlay" id="sheetOverlay" onclick="closeMxAlert()"></div>

<div id="mxAlertCard">
    <div class="mx-icon"><i class="fa-solid fa-play"></i></div>
    <h3>تشغيل عبر TDM Manager</h3>
    <p style="color: #888; font-size: 14px;">يتم الآن تحويلك للمشغل الخارجي...</p>
    <div class="mx-btn-group">
        <button class="mx-btn btn-confirm" id="confirmPlay">تشغيل</button>
        <button class="mx-btn btn-cancel" onclick="closeMxAlert()">إلغاء</button>
    </div>
</div>

<div id="homePage">
    <div class="slider-container">
        <div class="main-slide" id="slideBG">
            <div class="overlay"></div>
            <div class="movie-info-home">
                <h1 id="title" style="margin:0 0 15px;"></h1>
                <button class="watch-now-btn" onclick="openDetailsFromSlider()">◀ شاهد الآن</button>
            </div>
        </div>
    </div>

    <div class="section-header"><div class="amber-bar"></div><h2 style="font-size:1.1rem; margin:0;">ترند رمضان</h2></div>
    <div id="container1" class="horizontal-layout"></div>
</div>

<div id="detailsPage">
    <div class="back-nav" onclick="closeDetails()"><i class="fa-solid fa-arrow-right"></i></div>
    <div class="details-hero" id="detHero"></div>
    <div class="details-body">
        <h1 id="detTitle" style="margin:0 0 10px;"></h1>
        <p id="detStory" style="color:#aaa; font-size:14px;"></p>
        <h3 style="border-right:3px solid var(--amber); padding-right:10px;">الحلقات</h3>
        <div id="epList"></div>
    </div>
</div>

<script>
    const API_KEY = '74f38453bc66751d8bad40ebfa1b4eca';
    const IMG_URL = 'https://image.tmdb.org/t/p/original';
    
    // معرف مسلسل حمدية
    const idsRamadan = [314644, 313314, 304267, 303384];
    const zdDatabase = {
        "314644": { "1": "https://b2.shahidtv.net/files/IQ/Hamdiya/Hamdiya-S01-EP001-720p.mp4" }
    };

    let items = [], currentIndex = 0;

    function closeMxAlert() {
        document.getElementById('mxAlertCard').classList.remove('active');
        document.getElementById('sheetOverlay').style.display = 'none';
    }

    // دالة التشغيل المحدثة للمشغل com.tdm.manager
    function playInTDM(url, title) {
        if (!url || url === "#") { alert("الرابط غير متوفر."); return; }
        
        document.getElementById('mxAlertCard').classList.add('active');
        document.getElementById('sheetOverlay').style.display = 'block';
        
        document.getElementById('confirmPlay').onclick = () => {
            // صياغة الرابط لفتح تطبيق TDM Manager مباشرة
            const intentUrl = `intent:${url}#Intent;package=com.tdm.manager;S.title=${encodeURIComponent(title)};i.ext_priority=true;end`;
            
            // محاولة الفتح
            window.location.href = intentUrl;

            // فحص إذا لم يفتح التطبيق بعد 3 ثواني، يوجه للمتجر
            setTimeout(() => {
                if (!document.hidden) {
                    window.location.href = "https://play.google.com/store/apps/details?id=com.tdm.manager";
                }
            }, 3000);
            closeMxAlert();
        };
    }

    async function init() {
        // تحميل السلايدر (أول مسلسل)
        const r = await fetch(`https://api.themoviedb.org/3/tv/${idsRamadan[0]}?api_key=${API_KEY}&language=ar`);
        const d = await r.json();
        items.push(d);
        document.getElementById('slideBG').style.backgroundImage = `url('${IMG_URL}${d.backdrop_path}')`;
        document.getElementById('title').innerText = d.name;

        // تحميل قائمة المسلسلات
        const container = document.getElementById('container1');
        for (let id of idsRamadan) {
            const resp = await fetch(`https://api.themoviedb.org/3/tv/${id}?api_key=${API_KEY}&language=ar`);
            const data = await resp.json();
            const card = document.createElement('div');
            card.className = 'movie-card';
            card.onclick = () => openDetails(data);
            card.innerHTML = `<img src="https://image.tmdb.org/t/p/w500${data.poster_path}">`;
            container.appendChild(card);
        }
    }

    async function openDetails(item) {
        const loader = document.getElementById('page-loader');
        loader.classList.add('active');
        
        setTimeout(async () => {
            document.getElementById('detailsPage').style.display = 'block';
            document.getElementById('detHero').style.backgroundImage = `url('${IMG_URL}${item.backdrop_path}')`;
            document.getElementById('detTitle').innerText = item.name;
            document.getElementById('detStory').innerText = item.overview;
            
            const epList = document.getElementById('epList');
            epList.innerHTML = '';
            
            const res = await fetch(`https://api.themoviedb.org/3/tv/${item.id}/season/1?api_key=${API_KEY}&language=ar`);
            const sData = await res.json();
            
            sData.episodes.forEach(ep => {
                const epNum = ep.episode_number.toString();
                const videoUrl = (zdDatabase[item.id] && zdDatabase[item.id][epNum]) ? zdDatabase[item.id][epNum] : "#";
                
                epList.innerHTML += `
                    <div class="ep-card" onclick="playInTDM('${videoUrl}', '${item.name} - حلقة ${epNum}')">
                        <div style="background:var(--amber); color:black; width:30px; height:30px; border-radius:5px; display:flex; align-items:center; justify-content:center;"><i class="fa-solid fa-play"></i></div>
                        <div class="ep-meta">
                            <div style="font-weight:700;">الحلقة ${epNum}</div>
                        </div>
                        <div class="ep-thumb"><img src="${IMG_URL}${ep.still_path || item.backdrop_path}"></div>
                    </div>`;
            });
            
            loader.classList.replace('active', 'exit');
            setTimeout(() => loader.classList.remove('exit'), 600);
        }, 600);
    }

    function openDetailsFromSlider() { openDetails(items[0]); }
    function closeDetails() { document.getElementById('detailsPage').style.display = 'none'; }

    init();
</script>
</body>
</html>
