<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zD Flix VIP</title>
    <style>
        body { background: #000; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: #CCFF00; font-family: sans-serif; }
        .player-container { width: 95%; max-width: 800px; border: 2px solid #CCFF00; border-radius: 15px; overflow: hidden; box-shadow: 0 0 20px #CCFF00; background: #111; }
        video { width: 100%; display: block; }
        .loader { margin-top: 20px; font-weight: bold; text-shadow: 0 0 5px #CCFF00; }
    </style>
</head>
<body>

    <div class="player-container">
        <video id="mainPlayer" controls autoplay poster="https://cinemana.shabakaty.cc/assets/images/placeholder.png">
            <source src="" type="video/mp4">
        </video>
    </div>

    <div id="status" class="loader">جاري صيد رابط الفيلم... 📡</div>
    <div style="margin-top: 10px; font-size: 20px; font-weight: bold;">zD FLIX VIP ⚡</div>

    <script>
        async function fetchVideo() {
            const apiURL = "https://api.shabakaty.cc/v2/get_video_links";
            // استخدمنا بروكسي بديل هنا لضمان العمل
            const proxy = "https://corsproxy.io/?" + encodeURIComponent(apiURL);

            try {
                const response = await fetch(proxy, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ "video_id": "82725787", "userId": "0" })
                });
                const data = await response.json();
                
                if(data && data[0] && data[0].video_url) {
                    const videoElement = document.getElementById('mainPlayer');
                    videoElement.src = data[0].video_url;
                    videoElement.play();
                    document.getElementById('status').innerText = "تم الصيد بنجاح! مشاهدة ممتعة ✅";
                } else {
                    document.getElementById('status').innerText = "فشل الصيد.. السيرفر لا يستجيب حالياً";
                }
            } catch (error) {
                document.getElementById('status').innerText = "خطأ في الاتصال.. جاري المحاولة مرة أخرى";
                console.error(error);
            }
        }
        fetchVideo();
    </script>
</body>
</html>
