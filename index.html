<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZDflix | Cinema Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@400;700;800&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        * { -webkit-user-select: none; user-select: none; outline: none; }
        input, textarea { -webkit-user-select: text; user-select: text; }
        img { -webkit-user-drag: none; pointer-events: none; }
        :root { --amber: #FFBF00; --bg: #050505; --card: #121212; --toast-bg: #FFBF00; --font-main: 'Almarai', sans-serif; }
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 0; background-color: var(--bg); color: white; overflow-x: hidden; }

        /* --- الستارة --- */
        #page-loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: var(--amber); z-index: 9999; transform: translateX(-100%); transition: transform 0.6s cubic-bezier(0.77, 0, 0.175, 1); pointer-events: none; }
        #page-loader.active { transform: translateX(0); }
        #page-loader.exit { transform: translateX(100%); }

        /* --- كارت تنبيه TDM Player --- */
        #mxAlertCard { position: fixed; bottom: -100%; left: 0; width: 100%; background: #121212; z-index: 6000; padding: 30px 20px; border-radius: 25px 25px 0 0; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); border-top: 2px solid var(--amber); text-align: center; }
        #mxAlertCard.active { bottom: 0; }
        .mx-icon { width: 70px; height: 70px; background: #222; border-radius: 18px; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; border: 1px solid #333; }
        .mx-icon i { font-size: 35px; color: var(--amber); }
        .mx-btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .mx-btn { flex: 1; padding: 15px; border-radius: 12px; font-weight: 700; border: none; cursor: pointer; font-size: 15px; }
        .btn-confirm { background: var(--amber); color: black; }
        .btn-cancel { background: #222; color: white; }

        /* --- السلايدر --- */
        .slider-container { position: relative; width: 100%; height: 500px; overflow: hidden; background: #000; touch-action: pan-y; }
        .main-slide { width: 100%; height: 100%; background-size: cover; background-position: center; position: relative; display: flex; align-items: flex-end; transition: background-image 0.4s ease-in-out; }
        .overlay { position: absolute; inset: 0; background: linear-gradient(to top, var(--bg) 15%, transparent 75%); }
        .movie-info-home { position: relative; z-index: 5; padding: 25px; width: 100%; transition: opacity 0.3s; }
        h1.slide-title { font-size: 2rem; margin-bottom: 5px; font-weight: 700; }
        .meta-home { display: flex; align-items: center; gap: 8px; font-size: 13px; margin-bottom: 20px; font-weight: 600; opacity: 0.9; }
        .imdb-home { background: white; color: black; padding: 1px 6px; border-radius: 4px; font-weight: 800; }
        .action-row { display: flex; align-items: center; gap: 12px; }
        .watch-now-btn { background: var(--amber); color: black; border: none; padding: 14px; border-radius: 12px; font-weight: 700; flex: 1; font-size: 17px; display: flex; justify-content: center; align-items: center; gap: 8px; cursor: pointer; }
        .add-list-btn { background: rgba(255,255,255,0.15); color: white; border: none; width: 52px; height: 52px; border-radius: 12px; font-size: 22px; display: flex; justify-content: center; align-items: center; }

        /* --- الأقسام --- */
        .section-header { display: flex; justify-content: space-between; align-items: center; padding: 25px 15px 10px 15px; }
        .title-group { display: flex; align-items: center; gap: 10px; }
        .amber-bar { width: 4px; height: 24px; background-color: var(--amber); border-radius: 4px; }
        .section-title { font-size: 1.1rem; font-weight: 800; margin: 0; font-family: var(--font-main); }
        .view-all { color: #ffffff; text-decoration: none; font-size: 0.85rem; font-weight: 700; cursor: pointer; }
        .horizontal-layout { display: flex; overflow-x: auto; gap: 15px; padding: 10px 15px 20px 15px; scroll-behavior: smooth; }
        .horizontal-layout::-webkit-scrollbar { display: none; }
        .movie-card { min-width: 130px; max-width: 130px; background-color: #151515; border-radius: 12px; overflow: hidden; position: relative; transition: 0.3s; border: 1.5px solid rgba(255, 191, 0, 0.1); }
        .movie-card:active { transform: scale(0.92); border-color: var(--amber); }
        .poster-wrapper { position: relative; aspect-ratio: 2 / 3; }
        .poster-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        .card-overlay { position: absolute; bottom: 0; width: 100%; height: 50%; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); display: flex; align-items: flex-end; padding: 8px; box-sizing: border-box; }
        .movie-title { font-size: 0.75rem; font-weight: 700; margin: 0; color: white; }

        /* --- التفاصيل --- */
        #detailsPage { display: none; position: absolute; top: 0; width: 100%; z-index: 1000; background: var(--bg); min-height: 100vh; }
        .details-hero { width: 100%; height: 380px; background-size: cover; background-position: center; position: relative; }
        .back-nav { position: absolute; top: 25px; right: 20px; z-index: 1100; width: 40px; height: 40px; background: rgba(255, 191, 0, 0.2); border: 1px solid var(--amber); color: var(--amber); border-radius: 50%; display: flex; justify-content: center; align-items: center; }
        .details-body { padding: 20px; margin-top: -40px; position: relative; z-index: 5; }
        .interaction-bar { display: flex; justify-content: space-around; margin: 20px 0; border-top: 1px solid #222; border-bottom: 1px solid #222; padding: 15px 0; }
        .int-btn { display: flex; flex-direction: column; align-items: center; gap: 8px; color: white; font-size: 12px; }
        .int-btn i { font-size: 22px; color: var(--amber); }

        /* --- الحلقات --- */
        .ep-card { display: flex; flex-direction: row-reverse; background: var(--card); border-radius: 12px; margin-bottom: 15px; padding: 10px; gap: 12px; border: 1px solid #1f1f1f; align-items: center; }
        .ep-thumb { width: 100px; aspect-ratio: 16/9; border-radius: 8px; overflow: hidden; background: #222; }
        .ep-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .ep-meta { flex: 1; text-align: right; }
        .play-ep-btn { background: var(--amber); color: black; border: none; width: 35px; height: 35px; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="page-loader"></div>

<div id="mxAlertCard">
    <div class="mx-icon"><i class="fa-solid fa-play"></i></div>
    <h3 style="margin: 0 0 10px 0;">مشغل TDM Player</h3>
    <p style="color: #888; font-size: 14px; margin: 0; padding: 0 10px;">سيتم فتح الحلقة عبر المشغل الخارجي لضمان أفضل جودة.</p>
    <div class="mx-btn-group">
        <button class="mx-btn btn-confirm" id="confirmPlay">تشغيل الآن</button>
        <button class="mx-btn btn-cancel" onclick="closeMxAlert()">إلغاء</button>
    </div>
</div>

<div class="sheet-overlay" id="sheetOverlay" onclick="closeMxAlert()"></div>

<div id="homePage">
    <div class="slider-container" id="slider">
        <div class="main-slide" id="slideBG">
            <div class="overlay"></div>
            <div class="movie-info-home" id="homeInfo">
                <h1 class="slide-title" id="title"></h1>
                <div class="meta-home">
                    <span class="imdb-home" id="rating"></span>
                    <span id="year"></span> | <span id="type"></span>
                </div>
                <div class="action-row">
                    <button class="watch-now-btn" onclick="openDetailsFromSlider()">◀ شاهد الآن</button>
                </div>
            </div>
        </div>
    </div>

    <div id="wrapper1">
        <div class="section-header">
            <div class="title-group"><div class="amber-bar"></div><h2 class="section-title">ترند رمضان</h2></div>
        </div>
        <div id="container1" class="horizontal-layout"></div>
    </div>
</div>

<div id="detailsPage">
    <div class="back-nav" onclick="closeDetails()"><i class="fa-solid fa-arrow-right"></i></div>
    <div class="details-hero" id="detHero"><div class="overlay"></div></div>
    <div class="details-body">
        <h1 id="detTitle"></h1>
        <div id="detMeta" class="meta-home"></div>
        <p id="detStory"></p>
        <div class="episodes-section">
            <h3 id="seasonTitle" style="border-right: 4px solid var(--amber); padding-right: 10px;">الموسم 1</h3>
            <div id="epList"></div>
        </div>
    </div>
</div>

<script>
    const API_KEY = '74f38453bc66751d8bad40ebfa1b4eca';
    const IMG_URL = 'https://image.tmdb.org/t/p/original';
    
    const sliderIds = [314644, 313314, 304267];
    const idsRamadan = [314644, 313314, 304267, 303384, 242414, 304620];

    const zdDatabase = {
        "314644": { "1": "https://b2.shahidtv.net/files/IQ/Hamdiya/Hamdiya-S01-EP001-720p.mp4" }
    };

    let items = [], currentIndex = 0;

    function closeMxAlert() {
        document.getElementById('mxAlertCard').classList.remove('active');
        document.getElementById('sheetOverlay').style.display = 'none';
    }

    // تعديل الدالة لتعمل مع الحزمة الجديدة com.tdm.manager
    function playInTDM(url, title) {
        if (!url || url === "#") { alert("الرابط غير متوفر حالياً."); return; }
        
        const alertCard = document.getElementById('mxAlertCard');
        const overlay = document.getElementById('sheetOverlay');
        const confirmBtn = document.getElementById('confirmPlay');
        
        alertCard.classList.add('active');
        overlay.style.display = 'block';
        
        confirmBtn.onclick = () => {
            const intentUrl = `intent:${url}#Intent;package=com.tdm.manager;S.title=${encodeURIComponent(title)};i.ext_priority=true;end`;
            window.location.assign(intentUrl);
            
            setTimeout(() => { 
                if (!document.hidden) {
                    window.location.href = "https://play.google.com/store/apps/details?id=com.tdm.manager";
                }
            }, 2500);
            closeMxAlert();
        };
    }

    async function loadSlider() {
        for (let id of sliderIds) {
            try {
                const r = await fetch(`https://api.themoviedb.org/3/tv/${id}?api_key=${API_KEY}&language=ar`);
                const d = await r.json();
                d.media_type = 'tv'; items.push(d);
            } catch(e) {}
        }
        renderSlider();
    }

    function renderSlider() {
        if(items.length === 0) return;
        const item = items[currentIndex];
        document.getElementById('slideBG').style.backgroundImage = `url('${IMG_URL}${item.backdrop_path}')`;
        document.getElementById('title').innerText = item.name;
        document.getElementById('rating').innerText = `IMDb ${item.vote_average.toFixed(1)}`;
        document.getElementById('year').innerText = new Date(item.first_air_date).getFullYear();
        document.getElementById('type').innerText = "مسلسل";
    }

    async function fetchSection(ids, containerId) {
        const container = document.getElementById(containerId);
        for (let id of ids) {
            try {
                const resp = await fetch(`https://api.themoviedb.org/3/tv/${id}?api_key=${API_KEY}&language=ar`);
                const data = await resp.json();
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.onclick = () => openDetails(data, 'tv');
                card.innerHTML = `<div class="poster-wrapper"><img src="https://image.tmdb.org/t/p/w500${data.poster_path}"><div class="card-overlay"><h3 class="movie-title">${data.name}</h3></div></div>`;
                container.appendChild(card);
            } catch (e) {}
        }
    }

    async function openDetails(item, type) {
        const loader = document.getElementById('page-loader');
        loader.classList.add('active');
        setTimeout(async () => {
            document.getElementById('homePage').style.display = 'none';
            document.getElementById('detailsPage').style.display = 'block';
            window.scrollTo(0,0);
            document.getElementById('detHero').style.backgroundImage = `url('${IMG_URL}${item.backdrop_path}')`;
            document.getElementById('detTitle').innerText = item.name;
            document.getElementById('detStory').innerText = item.overview || 'لا يوجد وصف متاح.';
            
            const epContainer = document.getElementById('epList');
            epContainer.innerHTML = '';
            const currentID = item.id.toString();

            try {
                const res = await fetch(`https://api.themoviedb.org/3/tv/${item.id}/season/1?api_key=${API_KEY}&language=ar`);
                const sData = await res.json();
                sData.episodes.forEach(ep => {
                    const epNum = ep.episode_number.toString();
                    const directUrl = (zdDatabase[currentID] && zdDatabase[currentID][epNum]) ? zdDatabase[currentID][epNum] : "#"; 
                    epContainer.innerHTML += `
                    <div class="ep-card" onclick="playInTDM('${directUrl}', '${item.name} - حلقة ${ep.episode_number}')">
                        <div class="play-ep-btn"><i class="fa-solid fa-play"></i></div>
                        <div class="ep-meta">
                            <div style="color:var(--amber); font-weight:700;">الحلقة ${ep.episode_number}</div>
                            <div style="font-size:13px; color:#fff;">${ep.name}</div>
                        </div>
                        <div class="ep-thumb"><img src="${IMG_URL}${ep.still_path || item.backdrop_path}"></div>
                    </div>`;
                });
            } catch(e) { epContainer.innerHTML = 'خطأ في تحميل الحلقات.'; }
            
            loader.classList.replace('active', 'exit');
            setTimeout(() => loader.classList.remove('exit'), 600);
        }, 600);
    }

    function openDetailsFromSlider() { openDetails(items[currentIndex], 'tv'); }
    function closeDetails() {
        document.getElementById('detailsPage').style.display = 'none';
        document.getElementById('homePage').style.display = 'block';
    }

    loadSlider();
    fetchSection(idsRamadan, 'container1');
</script>
</body>
</html>
