<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zD Flix VIP</title>
    <style>
        body { background: #000; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: #CCFF00; font-family: sans-serif; overflow: hidden; }
        .player-container { width: 95%; max-width: 800px; border: 2px solid #CCFF00; border-radius: 20px; overflow: hidden; box-shadow: 0 0 30px #CCFF00; background: #000; position: relative; }
        video { width: 100%; display: block; }
        .logo { margin-top: 25px; font-size: 24px; font-weight: bold; text-shadow: 0 0 10px #CCFF00; letter-spacing: 2px; }
        .status { margin-top: 10px; font-size: 14px; color: #fff; opacity: 0.7; }
    </style>
</head>
<body>

    <div class="player-container">
        <video id="zDPlayer" controls autoplay>
            </video>
    </div>

    <div class="logo">zD FLIX VIP ⚡</div>
    <div id="status" class="status">جاري الاتصال عبر الجسر الخاص بك... 📡</div>

    <script>
        async function startApp() {
            // رابط الجسر الخاص بك الذي أنشأته الآن
            const myBridge = "https://calm-snowflake-8f2a.yazenw32.workers.dev";
            
            try {
                const response = await fetch(myBridge, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ "video_id": "82725787", "userId": "0" })
                });

                const data = await response.json();
                
                if(data && data[0] && data[0].video_url) {
                    const videoElement = document.getElementById('zDPlayer');
                    videoElement.src = data[0].video_url;
                    document.getElementById('status').innerText = "تم الاتصال بنجاح. مشاهدة ممتعة! ✅";
                } else {
                    document.getElementById('status').innerText = "السيرفر لم يرسل رابط الفيديو.. تأكد من صلاحية الفيلم";
                }
            } catch (error) {
                document.getElementById('status').innerText = "خطأ في الاتصال بالجسر.. تأكد من نشر الـ Worker";
                console.error(error);
            }
        }

        startApp();
    </script>
</body>
</html>
