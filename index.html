<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zD FLIX VIP | هيبة المشاهدة</title>
    <style>
        body { 
            background: #000; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            color: #CCFF00; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; 
        }
        .player-container { 
            width: 95%; 
            max-width: 800px; 
            border: 3px solid #CCFF00; 
            border-radius: 15px; 
            overflow: hidden; 
            box-shadow: 0 0 25px rgba(204, 255, 0, 0.4); 
            background: #111;
        }
        video { width: 100%; display: block; outline: none; }
        .logo { 
            margin-top: 20px; 
            font-size: 28px; 
            font-weight: bold; 
            text-shadow: 0 0 15px #CCFF00; 
            letter-spacing: 3px; 
        }
        .status { 
            margin-top: 15px; 
            font-size: 14px; 
            color: #fff; 
            background: rgba(255,255,255,0.1);
            padding: 5px 15px;
            border-radius: 20px;
        }
    </style>
</head>
<body>

    <div class="player-container">
        <video id="zDPlayer" controls autoplay poster="https://via.placeholder.com/800x450/000000/CCFF00?text=zD+FLIX+Loading...">
            </video>
    </div>

    <div class="logo">zD FLIX VIP ⚡</div>
    <div id="status" class="status">جاري تشغيل السيرفر الخاص بك... 📡</div>

    <script>
        async function loadVideo() {
            // رابط الجسر (Worker) اللي سويته أنت بيدك
            const workerUrl = "https://calm-snowflake-8f2a.yazenw32.workers.dev";
            const statusBox = document.getElementById('status');
            
            try {
                // إرسال طلب لجلب فيلم (مثال لفيلم من سينمانا)
                const response = await fetch(workerUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        "video_id": "82725787", // معرف الفيديو
                        "userId": "0" 
                    })
                });

                const data = await response.json();
                
                if(data && data[0] && data[0].video_url) {
                    const video = document.getElementById('zDPlayer');
                    video.src = data[0].video_url;
                    statusBox.innerText = "متصل بنجاح.. مشاهدة ممتعة يا حسن! ✅";
                    statusBox.style.color = "#CCFF00";
                } else {
                    statusBox.innerText = "السيرفر شغال بس الفيلم غير متاح حالياً ⚠️";
                }
            } catch (error) {
                statusBox.innerText = "خطأ: تأكد إن الـ Worker في وضع Active ❌";
                console.error(error);
            }
        }

        // تشغيل التطبيق فوراً
        loadVideo();
    </script>
</body>
</html>
