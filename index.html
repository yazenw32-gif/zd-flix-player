<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zD Flix Debug</title>
    <style>
        body { background: #000; color: #CCFF00; text-align: center; font-family: sans-serif; padding: 20px; }
        .btn { background: #CCFF00; color: #000; padding: 15px; border-radius: 10px; text-decoration: none; font-weight: bold; display: inline-block; margin-top: 20px; }
    </style>
</head>
<body>
    <h2>zD FLIX VIP ⚡</h2>
    <div id="loader">جاري محاولة استخراج الرابط...</div>
    <div id="result" style="display:none;">
        <p>تم استخراج الرابط بنجاح!</p>
        <a id="videoLink" class="btn" href="#">اضغط هنا لفتح الفيديو في مشغل خارجي</a>
        <p style="font-size: 12px; margin-top: 10px;">(إذا لم يعمل، فالسيرفر حظر الآي بي الخاص بالبروكسي)</p>
    </div>

    <script>
        async function getLink() {
            const proxy = "https://api.allorigins.win/raw?url=";
            const api = "https://api.shabakaty.cc/v2/get_video_links";
            try {
                const res = await fetch(proxy + encodeURIComponent(api), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ "video_id": "82725787", "userId": "0" })
                });
                const data = await res.json();
                if(data[0].video_url) {
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('result').style.display = 'block';
                    document.getElementById('videoLink').href = data[0].video_url;
                }
            } catch (e) {
                document.getElementById('loader').innerText = "فشل في جلب الرابط، السيرفر محمي جداً.";
            }
        }
        getLink();
    </script>
</body>
</html>
